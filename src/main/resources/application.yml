spring:
  application:
    name: payment-demo

  # 1. DB 연결 설정 (임시 exclude는 삭제하고 진짜 DB 주소 추가)
  datasource:
    url: jdbc:mysql://${RDS_HOSTNAME:localhost}:3306/payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA (엔티티 자동 생성 및 쿼리 로그) 설정
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # 3. 기존 설정들 (들여쓰기 위치 교정 완료)
  config:
    import:
      - optional:classpath:client-api-config.yml
      - optional:classpath:application-local.properties

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  security:
    user:
      name: demo
      password: demo123

server:
  port: 8080
  servlet:
    context-path: /

# PortOne Configuration
portone:
  api:
    base-url: https://api.portone.io
    secret: ${PORTONE_API_SECRET:}
  store:
    id: ${PORTONE_STORE_ID:}
  channel:
    kg-inicis: ${PORTONE_CHANNEL_KG:}
    toss: ${PORTONE_CHANNEL_TOSS:}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:commercehub-secret-key-for-demo-please-change-this-in-production-environment}
  token-validity-in-seconds: ${JWT_VALIDITY:86400}  # 24 hours

# UI Branding Configuration
app:
  ui:
    branding:
      app-name: CommerceHub
      tagline: 통합 커머스 플랫폼
      logo-text: 🏪 CommerceHub

logging:
  level:
    com.bootcamp.paymentdemo: DEBUG
    org.springframework.security: INFO
