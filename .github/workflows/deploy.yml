name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ] # develop 브랜치에 합쳐질 때도 배포되도록 추가!

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 팀 협업을 위해 latest 외에 커밋 해시(sha) 태그
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/infra-skeleton:latest
            ${{ secrets.DOCKER_USERNAME }}/infra-skeleton:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "1. 기존 컨테이너 중지 및 삭제"
            sudo docker stop infra-skeleton || true
            sudo docker rm infra-skeleton || true
            
            echo "2. 최신 이미지 다운로드"
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/infra-skeleton:latest
            
            echo "3. 도커 컨테이너 실행 (RDS, PortOne, JWT 환경변수 주입)"
            #  -e 옵션을 통해 깃허브 시크릿 값을 도커 컨테이너 내부로 전달합니다.
            sudo docker run -d --name infra-skeleton -p 8080:8080 \
              -e RDS_HOSTNAME="${{ secrets.RDS_HOSTNAME }}" \
              -e RDS_USERNAME="${{ secrets.RDS_USERNAME }}" \
              -e RDS_PASSWORD="${{ secrets.RDS_PASSWORD }}" \
              -e PORTONE_API_SECRET="${{ secrets.PORTONE_API_SECRET }}" \
              -e PORTONE_STORE_ID="${{ secrets.PORTONE_STORE_ID }}" \
              -e PORTONE_CHANNEL_KG="${{ secrets.PORTONE_CHANNEL_KG }}" \
              -e PORTONE_CHANNEL_TOSS="${{ secrets.PORTONE_CHANNEL_TOSS }}" \
              -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              ${{ secrets.DOCKER_USERNAME }}/infra-skeleton:latest
            
            echo "4. 사용하지 않는 찌꺼기 이미지 삭제 (용량 확보)"
            sudo docker image prune -f